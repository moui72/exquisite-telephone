name: CI

on:
  push:
    branches: [main, release]
  pull_request:

jobs:
  checks:
    # release only ever receives a fast-forward of main, which already
    # passed these checks on its own push — no need to re-run them.
    if: github.ref != 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      # fly.toml and fly.staging.toml are generated from one template;
      # this fails if either has been hand-edited. It sits in `checks`
      # rather than its own job so it inherits the skip on `release`,
      # which only ever receives a fast-forward of `main` whose tree
      # already passed here.
      - run: pnpm run check:fly

  deploy-beta:
    name: Deploy beta (main)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    concurrency: deploy-beta
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BETA }}

  deploy-prod:
    name: Deploy prod (release)
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-prod
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
