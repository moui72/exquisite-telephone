name: CI

on:
  push:
    # `release` is deliberately absent. It only ever receives a
    # fast-forward of `main`, so its tree has already passed `checks`
    # here; and prod is deployed by promote.yml, not by anything reacting
    # to a push. Running this workflow on `release` would re-test an
    # identical tree and deploy nothing.
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      # fly.toml and fly.staging.toml are generated from one template;
      # this fails if either has been hand-edited. It sits in `checks`
      # rather than its own job so it inherits the skip on `release`,
      # which only ever receives a fast-forward of `main` whose tree
      # already passed here.
      - run: pnpm run check:fly

  deploy-beta:
    name: Deploy beta (main)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    concurrency: deploy-beta
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BETA }}

# There is deliberately NO deploy-prod job here. Production is deployed
# only by promote.yml, which fast-forwards `release` and deploys in the
# same manual run — see infrastructure.md, Release Promotion. A push to
# `release` therefore deploys nothing on its own.
