name: CI

on:
  push:
    # `release` is deliberately absent. It only ever receives a
    # fast-forward of `main`, so its tree has already passed `checks`
    # here; and prod is deployed by promote.yml, not by anything reacting
    # to a push. Running this workflow on `release` would re-test an
    # identical tree and deploy nothing.
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      # fly.toml and fly.staging.toml are generated from one template;
      # this fails if either has been hand-edited. It sits in `checks`
      # rather than its own job so it inherits the skip on `release`,
      # which only ever receives a fast-forward of `main` whose tree
      # already passed here.
      - run: pnpm run check:fly

  # Gate the beta deploy on whether a push actually changed code. Beta was
  # auto-deploying on *every* push to main, including pushes that touch only
  # docs / repo metadata (`.project/` ArDD state, README, `.github/`
  # workflows and badges), which re-ship an identical app for no reason.
  # `checks` still runs on every push — only the deploy is gated — so a
  # docs-only PR never stalls waiting on a skipped required check.
  changes:
    name: Detect code changes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Need history for both ends of the pushed range to diff them.
          fetch-depth: 0
      - id: filter
        # "Code" is everything EXCEPT docs / ArDD project state / `.github/`
        # repo metadata. Note pnpm-lock.yaml is NOT excluded (it lives at
        # repo root, not under .github/), so a lockfile-only change counts
        # as code and deploys; the Dockerfile and fly configs likewise stay
        # code. When the base is unknown (first push, force push), deploy to
        # be safe rather than silently skip.
        run: |
          base='${{ github.event.before }}'
          if [ -z "$base" ] || [ "$base" = '0000000000000000000000000000000000000000' ]; then
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "$base" ]; then
            echo 'no comparison base; treating as a code change' >&2
            echo 'code=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base" '${{ github.sha }}')"
          echo 'changed files:'
          printf '%s\n' "$changed"
          # Lines that are NOT docs/project state are code. `|| true` keeps
          # the step from failing when grep selects nothing (exit 1).
          code_files="$(printf '%s\n' "$changed" | grep -vE '^(\.project/|\.github/|README\.md$|CLAUDE\.md$|LICENSE\.md$)' || true)"
          if [ -n "$code_files" ]; then
            echo 'code changes detected:'
            printf '%s\n' "$code_files"
            echo 'code=true' >> "$GITHUB_OUTPUT"
          else
            echo 'docs-only push — skipping beta deploy'
            echo 'code=false' >> "$GITHUB_OUTPUT"
          fi

  deploy-beta:
    name: Deploy beta (main)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.code == 'true'
    needs: [checks, changes]
    runs-on: ubuntu-latest
    concurrency: deploy-beta
    # The short sha this deploy baked into the beta bundle, consumed by the
    # e2e job's version cross-check (T012).
    outputs:
      sha: ${{ steps.deploy.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Bake the channel-aware version into the beta bundle (infrastructure.md
      # — App Versioning). The X.Y.Z is the last tagged release (the current
      # root package.json value) and the short sha identifies exactly which
      # beta build a report came from, so the composed string is
      # vX.Y.Z-beta+<sha>.
      - name: Deploy beta
        id: deploy
        run: |
          version="$(node -p "require('./package.json').version")"
          sha="$(git rev-parse --short=7 HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          flyctl deploy --config fly.staging.toml --remote-only \
            --build-arg APP_VERSION="$version" \
            --build-arg BUILD_CHANNEL=beta \
            --build-arg BUILD_SHA="$sha"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BETA }}

  # T011 — Cross-browser end-to-end suite, run AFTER a successful beta
  # deploy and gated by the SAME code-change signal that gates the deploy
  # (infrastructure.md — End-to-End Test Gate). A docs/chore push skips
  # deploy-beta, so `needs: [deploy-beta]` skips this too, and the explicit
  # `changes.outputs.code == 'true'` guard is belt-and-braces. The suite is
  # slow and deploy-dependent, so it is deliberately NOT part of the fast
  # per-push `checks` job.
  e2e:
    name: Cross-browser e2e (beta)
    needs: [changes, deploy-beta]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # One matrix leg per browser ENGINE (infrastructure.md — Parallelism
      # and isolation). A mixed shard fan-out serialized the slow engines
      # (webkit, msedge) behind whatever shard they landed in; giving each
      # engine its own runner lets them run fully in parallel, so the wall
      # time is the slowest single engine, not the slowest shard. Each test
      # still mints its own room and the store scopes broadcasts per room,
      # so the legs never collide against the one shared beta server.
      matrix:
        project: [chromium, firefox, webkit, msedge]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The observer helper and specs import the built shared package
      # (@exquisite-telephone/shared -> shared/dist); build it before
      # Playwright collects tests, or module resolution fails at load.
      - run: pnpm run build:shared
      - run: pnpm run e2e:install
      - name: Run e2e engine against live beta
        run: pnpm exec playwright test --project=${{ matrix.project }}
        env:
          # The suite hits the already-deployed beta bundle; no local server
          # is started when E2E_BASE_URL is set.
          E2E_BASE_URL: https://beta-ex-tel.ty-pe.com
          # The test-signal secret the T004/T005 seams require, so test
          # traffic is tagged (ratings discarded, sub-floor timers allowed).
          # Held by CI, sent as the x-e2e-test-signal header.
          E2E_TEST_SIGNAL_SECRET: ${{ secrets.E2E_TEST_SIGNAL_SECRET }}
          # The short sha this run deployed and is testing — the version
          # cross-check (version.spec.ts) fails if the live bundle reports a
          # different sha (T012).
          E2E_EXPECTED_SHA: ${{ needs.deploy-beta.outputs.sha }}

  # T012 — Record the aggregate e2e result keyed to the deployed commit sha.
  # DECISION (infrastructure.md [OPEN]): a GitHub COMMIT STATUS on the sha,
  # not a stored artifact — it is native, needs no external store, and is
  # exactly what promote.yml (T013) looks up for the commit it promotes. The
  # context name `e2e/cross-browser` is the contract between the two.
  e2e-result:
    name: Record e2e result on the commit
    needs: [changes, e2e]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state="failure"
          if [ "${{ needs.e2e.result }}" = "success" ]; then state="success"; fi
          echo "e2e result: ${{ needs.e2e.result }} -> status $state on ${{ github.sha }}"
          gh api -X POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context="e2e/cross-browser" \
            -f description="Cross-browser e2e: $state"

# There is deliberately NO deploy-prod job here. Production is deployed
# only by promote.yml, which fast-forwards `release` and deploys in the
# same manual run — see infrastructure.md, Release Promotion. A push to
# `release` therefore deploys nothing on its own.
