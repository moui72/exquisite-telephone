name: Promote main to release

# Manual promotion only, and the ONLY path that deploys prod (fly.toml,
# exquisite-telephone). `release` only ever receives a fast-forward of
# `main`; this workflow performs that fast-forward AND the deploy in one
# run, replacing both the remembered `git push origin main:release` and
# the push-triggered deploy-prod job ci.yml used to carry.
#
# Re-dispatching when release is already current is harmless: the push is
# a no-op ("Everything up-to-date") and the deploy simply re-ships the
# same tree.
on:
  workflow_dispatch:

# Two dispatches must not race each other onto the same branch, nor into
# the same Fly app. This group covers the fast-forward AND the deploy,
# which is why it is not the `deploy-prod` group ci.yml used to hold.
concurrency:
  group: promote-release
  cancel-in-progress: false

# The push below is authenticated with the built-in GITHUB_TOKEN, which
# needs write access to push to `release`.
permissions:
  contents: write

jobs:
  promote:
    name: Fast-forward release to main, then deploy prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          # A shallow clone cannot compute fast-forwardness — git needs the
          # full history of both branches to know whether release is an
          # ancestor of main.
          fetch-depth: 0

      - name: Push main to release (fast-forward only)
        run: |
          set -euo pipefail

          # A plain, non-force push. Git itself rejects a non-fast-forward
          # update, which is exactly the behaviour we want: divergence means
          # release holds a commit main does not have, and that commit never
          # passed `checks` on main. That invariant is what lets release skip
          # CI, so a human must resolve it — this workflow must never merge
          # and never force-push.
          if git push origin main:release; then
            echo "release fast-forwarded to $(git rev-parse --short main)"
            exit 0
          fi

          echo "::error::Promotion aborted: release could not be fast-forwarded from main."
          cat >&2 <<'MSG'

          release has diverged from main — it holds at least one commit that
          main does not.

          This is not something this workflow may repair. It will never merge
          and never force-push: prod deploys from release WITHOUT re-running
          checks, and that is only safe because every commit on release
          already passed checks on main. A merge or force-push here would
          deploy code that never did.

          Resolve it by hand, then re-run this workflow:

            git fetch origin
            git log --oneline origin/main..origin/release   # what release has that main doesn't

          Get those commits onto main (cherry-pick or revert them there) so
          that release becomes a strict ancestor of main again.
          MSG
          exit 1

      # This run deploys prod itself rather than letting the push above
      # trigger a separate job. A push authenticated with GITHUB_TOKEN does
      # not trigger further workflow runs (GitHub's recursion guard), so a
      # push-triggered deploy would never fire and this workflow would go
      # green having deployed nothing. Deploying here is what makes the
      # dispatch's success mean what it appears to mean.
      #
      # It runs only if the push above succeeded: `set -euo pipefail` plus
      # the explicit `exit 1` fails the step, and a failed step skips the
      # rest of the job by default. A diverged release is never deployed.
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy prod
        # The checkout is `main`, whose tree is now byte-identical to
        # release — deploying from this working copy and deploying from a
        # fresh release checkout are the same tree, by fast-forward.
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
