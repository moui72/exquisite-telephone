# Beta/stage app — deployed automatically from `main` (see .github/workflows/ci.yml).
# Mirrors fly.toml; only `app` differs. Prod (fly.toml) deploys only from `release`.
# After the very first deploy, run `fly scale count 1 -a exquisite-telephone-beta`
# once — same in-memory room-state reasoning as fly.toml (see its comments).
app = "exquisite-telephone-beta"
primary_region = "iad"
# Custom domain: beta-ex-tel.ty-pe.com (cert managed via `fly certs`, DNS
# in Namecheap on ty-pe.com — not tracked here).

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
